server:
  port: 8080

spring:
  application:
    name: purple-clay-story

  datasource:
    url: jdbc:mysql://localhost:3306/purpleclay_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms

  cache:
    type: redis
    redis:
      time-to-live: 600000  # 10 minutes

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

jwt:
  secret: ${JWT_SECRET:purple-clay-story-super-secret-key-change-in-production-min-256-bits}
  expiration: 86400000       # 24 hours
  refresh-expiration: 604800000  # 7 days

openai:
  api-key: ${OPENAI_API_KEY:your-openai-api-key-here}
  model:
    chat: gpt-4o
    image: dall-e-3
  image:
    size: 1024x1024
    quality: standard

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

logging:
  level:
    com.purpleclay.jewelry: DEBUG
    org.springframework.security: INFO
    org.springframework.cache: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%X{requestId}] [%X{userEmail}] %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%X{requestId}] [%X{userEmail}] %logger{36} - %msg%n"
  file:
    name: logs/purple-clay-story.log

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,loggers
  endpoint:
    health:
      show-details: when-authorized
